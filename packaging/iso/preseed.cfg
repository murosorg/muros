# MurOS installer preseed for the Debian 13 (trixie) LIVE standard image.
#
# Single, offline-capable installer. The base system is copied from the
# live squashfs (no Debian mirror) and MurOS comes from the on-disc pool
# (no download.muros.org). The install is fully unattended.
#
# Networking is NOT configured by the installer. Like OPNsense, the
# appliance assigns its interfaces on first boot: MurOS maps the physical
# NICs to the logical interfaces (wan, lan, ...), brings WAN up on DHCP and
# LAN up on its static address, then loads the firewall. The operator then
# reaches the web UI on the LAN (default https://192.168.1.1).
#
# Placeholders (@NAME@) are substituted by build-iso.sh at build time.

### Localization. Locale and keyboard are preseeded so the install runs
### unattended. The console keymap defaults to US; an operator can switch
### it later at the console with "loadkeys" (the kbd package is installed).
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network: not configured by the installer (see header). MurOS assigns
### the interfaces and brings them up on first boot, so d-i asks nothing
### about networking and the install needs no link, DHCP server or resolver.
d-i netcfg/enable boolean false
d-i netcfg/get_hostname string muros
d-i netcfg/get_domain string local
d-i netcfg/hostname string muros

### Hardware detection: do not scan removable media for missing firmware.
# This install is fully offline and carries no firmware blobs, so the
# hw-detect missing-firmware check has nothing to find. Left enabled it
# mounts and scans every removable device (including the large install
# medium) for each piece of firmware the kernel requests, which stalls
# hw-detect for minutes with no visible output. Disable it.
d-i hw-detect/load_firmware boolean false

### Clock and time zone
d-i clock-setup/utc boolean true
d-i time/zone string Etc/UTC
d-i clock-setup/ntp boolean false

### Accounts
# MurOS authenticates the web UI and SSH against the system root account
# (PAM). We therefore enable root login and create no normal user.
d-i passwd/root-login boolean true
d-i passwd/make-user boolean false
d-i passwd/root-password-crypted password @ROOT_PW_HASH@

### Partitioning
# Pick the first physical disk dynamically so the same ISO works on any
# hardware/VM regardless of the device name (sda, vda, nvme0n1, ...).
d-i partman/early_command string \
  DISK=$(list-devices disk | head -n1); \
  debconf-set partman-auto/disk "$DISK"; \
  debconf-set grub-installer/bootdev "$DISK"
d-i partman-auto/method string lvm
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-auto-lvm/guided_size string max
d-i partman-auto/choose_recipe select atomic
d-i partman/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Base system and packages (offline).
# No network mirror: the base system is installed from the live medium.
d-i apt-setup/use_mirror boolean false
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/contrib boolean false
d-i apt-setup/non-free boolean false
d-i apt-setup/cdrom/set-first boolean false
d-i apt-setup/cdrom/set-next boolean false
d-i apt-setup/cdrom/set-failed boolean false
# Configure no network apt service. After disabling the install CD,
# apt-setup would otherwise try to set up the security and updates
# sources, contacting security.debian.org with no resolver (this firewall
# install has no DNS and no DHCP), which stalls for minutes on DNS
# timeouts. Select no service and leave the security host empty so
# apt-setup makes no network call at all. The signed download.muros.org repo
# is registered later, on the installed system, by late_command.
d-i apt-setup/services-select multiselect
d-i apt-setup/security_host string
d-i apt-setup/use_volatile boolean false
tasksel tasksel/first multiselect standard
# kbd + console-setup ship loadkeys/setupcon so an operator at the
# physical console can switch the keyboard layout (e.g. "loadkeys fr").
d-i pkgsel/include string ca-certificates kbd console-setup
d-i pkgsel/upgrade select none
popularity-contest popularity-contest/participate boolean false

### Bootloader
d-i grub-installer/only_debian boolean true

### Finish
d-i finish-install/reboot_in_progress note

### Install MurOS fully offline.
# All the logic lives in /cdrom/muros/late_command.sh (staged on the ISO
# by build-iso.sh): copy the wheelhouse and the package pool into the
# target, install muros from the local pool with no network, then restore
# clean online apt sources. Kept as a script, not inline, because a long
# multi-line inline late_command was misparsed by debconf (quoting).
d-i preseed/late_command string \
  cp /cdrom/muros/late_command.sh /tmp/muros-late.sh; \
  sh /tmp/muros-late.sh

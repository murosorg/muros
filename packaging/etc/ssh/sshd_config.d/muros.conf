# Drop-in sshd MurOS.
#
# Charge automatiquement par sshd (Include /etc/ssh/sshd_config.d/*.conf
# present dans le sshd_config par defaut de Debian/Ubuntu).
#
# Politique :
# - Auth uniquement par cle, jamais par mot de passe
# - Root SSH autorise par cle uniquement (defaut Debian cloud-init,
#   evite le lock-out sur install fresh sans user dedie). Pour serrer
#   au maximum, basculer 'PermitRootLogin no' depuis l'UI MurOS apres
#   avoir cree un user dedie + cle.
# - Forwarding desactive (le firewall n'a aucune raison de tunneler)
# - Restreint a une IP de management : decommenter Match Address ci-dessous
#   et remplacer 192.0.2.10 par votre IP / sous-reseau d'admin.

# Auth par cle uniquement
PasswordAuthentication no
ChallengeResponseAuthentication no
PermitEmptyPasswords no
KbdInteractiveAuthentication no
UsePAM yes

# Root SSH : par cle uniquement (compromis : evite le lock-out sur une
# install fresh, refuse les bruteforce par password)
PermitRootLogin prohibit-password

# Pas de tunnels
AllowAgentForwarding no
AllowTcpForwarding no
X11Forwarding no
PermitTunnel no
GatewayPorts no

# Limiter les tentatives
MaxAuthTries 3
LoginGraceTime 30
MaxSessions 4
MaxStartups 5:30:10

# Couper les sessions mortes
ClientAliveInterval 300
ClientAliveCountMax 2

# Restreindre la source : decommenter et adapter pour pinner l'IP/le subnet
# de management. Tout ce qui ne match pas tombe dans le Match suivant qui
# coupe l'access.
#
# Match Address 192.0.2.0/24
#     AllowGroups muros-admin
#
# Match all
#     DenyUsers *

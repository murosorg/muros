# Drop-in sysctl MurOS pour le durcissement noyau d'un firewall.
#
# Pose par le paquet 'muros' a l'install et active par 'sysctl --system'.
# Obligatoire : un firewall sans forwarding et sans rp_filter strict n'est
# pas un firewall. Ce fichier n'est pas editable depuis l'UI.
#
# Principe : on ne pin QUE les cles ou le defaut Debian 13 est incompatible
# avec un firewall. Les durcissements deja appliques par Debian/systemd par
# defaut (tcp_syncookies, source_route, icmp_echo_ignore_broadcasts,
# somaxconn 4096) sont laisses au distributeur et ne sont pas dupliques ici.
#
# Si vous devez deroger sur un point : posez votre propre fichier dans
# /etc/sysctl.d/ avec un prefixe numerique > 99 (ex 999-local.conf).

# --- Fonctionnel : forwarding (Debian defaut = 0) ---
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1
net.ipv6.conf.default.forwarding = 1

# --- Tuning : defauts noyau trop justes pour un firewall a vrai trafic ---
# Conntrack : table de suivi de connexions. Defaut ~65536 = OK poste, juste pour firewall.
net.netfilter.nf_conntrack_max = 262144
# Queue SYN : on lisse les pics. Defaut Debian 1024-2048.
net.ipv4.tcp_max_syn_backlog = 4096

# --- Securite : durcissements absents du defaut Debian ---

# Anti IP spoofing : rp_filter strict (1).
# systemd 50-default.conf pose 2 (loose), on force strict pour topologie symetrique.
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Pas d'ICMP redirects : ni acceptes (anti hijack), ni envoyes (un firewall
# n'a pas a indiquer aux clients un meilleur chemin).
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Logger les paquets avec adresse impossible (martians) : utile en enquete.
net.ipv4.conf.all.log_martians = 1

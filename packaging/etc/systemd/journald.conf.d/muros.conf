# Limites de retention pour les logs noyau et services MurOS.
# Le firewall peut etre tres bavard si beaucoup de regles avec `log`,
# on borne pour ne pas remplir le disque.

[Journal]
Storage=persistent
SystemMaxUse=500M
SystemKeepFree=200M
SystemMaxFileSize=50M
MaxFileSec=1week
MaxRetentionSec=1month
ForwardToSyslog=no
ForwardToWall=no

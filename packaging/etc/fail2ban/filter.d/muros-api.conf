# fail2ban filter for authentication failures on the MurOS API.
#
# The FastAPI backend logs a WARNING event on failure: the 'muros.auth'
# logger emits one of:
#   "auth failed for <user> from <ip>"            (password step)
#   "2FA failed for <user> from <ip>"             (TOTP second factor)
#   "auth refused (no UI access) for <user> ..."  (account not granted)
# We also catch the 401s read from the nginx access log, covering both the
# password endpoint and the TOTP verification endpoint.

[Definition]

failregex = ^.*muros\.auth.*(auth failed|2FA failed|auth refused).* from <HOST>.*$
            ^<HOST> .* "POST /api/auth/login(/verify)? HTTP/[\d\.]+" (401|403) .*$

ignoreregex =

# systemd journal datepattern: let fail2ban guess

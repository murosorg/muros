# Filtre fail2ban pour les echecs d'auth sur l'API MurOS.
#
# Le backend FastAPI log un evenement avec niveau WARNING en cas d'echec :
# le logger 'muros.auth' emet "auth failed for <user> from <ip>".
# On peut aussi rattraper les 401 lus dans le access log nginx.

[Definition]

failregex = ^.*muros\.auth.*auth failed for .* from <HOST>.*$
            ^<HOST> .* "POST /api/auth/login HTTP/[\d\.]+" 401 .*$

ignoreregex =

# datepattern systemd journal : laisser fail2ban deviner

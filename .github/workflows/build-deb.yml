name: build-deb

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Necessaire pour que softprops/action-gh-release puisse creer la
# Release publique sur le repo (par defaut GITHUB_TOKEN est read-only).
permissions:
  contents: write

# Run JavaScript actions on Node 24. Node 20 is deprecated on GitHub
# runners (removed Sept 2026). We keep the actions at their current
# versions (the action-gh-release SHA pin is deliberate) and force the
# Node 24 runtime here instead, the sanctioned opt-in until those actions
# ship Node 24 native majors.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: debian:trixie
    steps:
      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential debhelper devscripts \
            libdistro-info-perl distro-info-data \
            python3 python3-venv python3-pip \
            nodejs npm ca-certificates git
      - uses: actions/checkout@v4
        # fetch-depth=0 : on a besoin de l'historique pour lire la
        # description du tag (utilisee comme entree changelog).
        with:
          fetch-depth: 0
      - name: Stage debian/ dir at repo root
        run: cp -r packaging/debian debian
      - name: Set version from tag
        run: |
          # Marque le repo comme safe pour git dans le container (sinon
          # 'fatal: detected dubious ownership' sur les commandes git).
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          VERSION=${GITHUB_REF_NAME#v}
          # On lit le subject du tag annote (ex 'rc45: composants UI...'),
          # ca finit dans le changelog Debian au lieu d'un message generique.
          # Fallback si le tag est lightweight ou sans message.
          SUBJECT=$(git tag -l --format='%(contents:subject)' "$GITHUB_REF_NAME" | head -1)
          if [ -z "$SUBJECT" ]; then
            SUBJECT=$(git log -1 --format=%s "$GITHUB_REF_NAME")
          fi
          if [ -z "$SUBJECT" ]; then
            SUBJECT="Release $VERSION"
          fi
          # -b force la creation meme si la version est inferieure au
          # placeholder (le changelog initial peut etre a 0.0.1 par defaut)
          DEBEMAIL="muros@ecritel.net" DEBFULLNAME="MurOS CI" \
            dch -b -v "$VERSION" -D stable -M "$SUBJECT"
      - name: Build .deb
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p artifacts
          mv ../muros_*.deb artifacts/ || true
          cd artifacts
          for f in *.deb; do
            sha256sum "$f" > "$f.sha256"
          done
          ls -la
      - uses: actions/upload-artifact@v4
        with:
          name: muros-deb
          path: |
            artifacts/*.deb
            artifacts/*.sha256
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        # Pin sur le SHA exact de v2.6.2 plutot que @v2 mobile : evite
        # qu'un downgrade GitHub Actions (cas vu en rc40-42) ou une
        # nouvelle release de l'action puisse casser nos builds.
        # Pour bumper : verifier la nouvelle SHA via
        #   gh api repos/softprops/action-gh-release/git/refs/tags
        # et mettre a jour la ligne + le commentaire de version ci-dessous.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          # We do NOT flag rc tags as pre-release: GitHub refuses to set
          # make_latest=true on a pre-release. We keep make_latest=true so
          # /releases/latest resolves to the newest signed build, which
          # the apt publish step (muros-apt-publish, default "latest") and
          # the release badge rely on. The rc suffix in the tag name keeps
          # the "release candidate" indication for humans.
          prerelease: false
          make_latest: true
          files: |
            artifacts/*.deb
            artifacts/*.sha256
            install.sh
            uninstall.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Install the freshly built .deb on a clean Debian trixie and exercise
  # the real deployment path end to end. This job exists because three
  # shipped releases broke a real box in ways unit tests never see: a
  # dependency missing from the venv (python-pam, then six) made login
  # impossible, and a reused venv on upgrade never received new deps.
  # Catching those needs an actual install + service start + login, so we
  # run a privileged systemd container (the package relies on systemd) and
  # check: install succeeds, the backend serves /api/health, the Python
  # venv imports every runtime dependency, a PAM login returns a token,
  # the nftables ruleset loads, an upgrade/reinstall keeps login working,
  # and an uninstall leaves DNS resolving. A failure here blocks the apt
  # publish below.
  smoke-test:
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: muros-deb
          path: artifacts
      - name: Boot a systemd debian:trixie container
        run: |
          # The stock debian:trixie image is minimal and ships no init, so
          # /sbin/init does not exist. Boot bash as PID 1, install systemd
          # (systemd-sysv provides /sbin/init), then exec it so systemd
          # becomes PID 1 and we get a real boot to test the package against.
          docker run -d --name muros --privileged --cgroupns=host \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            -v "$PWD/artifacts:/artifacts:ro" \
            -e container=docker -e DEBIAN_FRONTEND=noninteractive \
            debian:trixie bash -c '
              apt-get update -qq
              apt-get install -y --no-install-recommends systemd systemd-sysv dbus
              exec /sbin/init'
          for i in $(seq 1 60); do
            state=$(docker exec muros systemctl is-system-running 2>/dev/null || true)
            case "$state" in running|degraded) echo "systemd: $state"; break;; esac
            sleep 2
          done
          docker exec muros systemctl is-system-running 2>/dev/null || \
            { echo "systemd did not come up"; docker logs muros | tail -30; exit 1; }
      - name: Install the freshly built .deb
        run: |
          docker exec muros bash -c 'apt-get update -qq'
          docker exec muros bash -c 'apt-get install -y $(ls /artifacts/muros_*.deb)'
      - name: Backend answers /api/health
        run: |
          docker exec muros bash -c '
            for i in $(seq 1 30); do
              curl -fsS http://127.0.0.1:8000/api/health && exit 0
              sleep 2
            done
            echo "backend never became healthy"; journalctl -u muros-backend -n 50 --no-pager || true; exit 1'
      - name: Python venv imports every runtime dependency
        # Direct guard against the python-pam / six / pyotp class of bugs:
        # a dependency missing from the built venv fails the import here
        # instead of silently breaking login on a customer box.
        run: |
          docker exec muros /opt/muros/backend/venv/bin/python -c \
            "import app.main, app.totp, pam, pyotp, six, qrcode; print('imports ok')"
      - name: PAM login returns a token
        run: |
          docker exec muros bash -c 'echo "root:SmokeTest123!" | chpasswd'
          docker exec muros bash -c '
            curl -fsS -X POST http://127.0.0.1:8000/api/auth/login \
              -H "Content-Type: application/json" \
              -d "{\"username\":\"root\",\"password\":\"SmokeTest123!\"}" \
              | grep -q access_token && echo "login ok"'
      - name: nftables ruleset is loaded
        run: docker exec muros bash -c 'nft list ruleset | grep -q "chain "'
      - name: Reinstall keeps the venv in sync and login working
        # Reproduces the upgrade/reinstall path: installing again over an
        # existing venv must re-sync requirements (the rc12 fix) and keep
        # login working.
        run: |
          docker exec muros bash -c 'apt-get install -y --reinstall $(ls /artifacts/muros_*.deb)'
          docker exec muros bash -c '
            for i in $(seq 1 20); do
              curl -fsS -X POST http://127.0.0.1:8000/api/auth/login \
                -H "Content-Type: application/json" \
                -d "{\"username\":\"root\",\"password\":\"SmokeTest123!\"}" \
                | grep -q access_token && echo "login ok after reinstall" && exit 0
              sleep 2
            done
            echo "login broken after reinstall"; exit 1'
      - name: Uninstall leaves a resolving box
        # The rc11/rc12 uninstall fixes: purging must not leave a dead
        # resolver or a stale nftables ruleset that breaks DNS / apt.
        run: |
          docker exec muros bash -c 'apt-get purge -y muros'
          docker exec muros bash -c 'getent hosts deb.debian.org >/dev/null && echo "dns still resolves"'
      - name: Tear down
        if: always()
        run: docker rm -f muros || true

  # After the GitHub release is published, push the same release into the
  # signed apt repository at apt.muros.org. The deploy key is locked on
  # the server to a single forced command (muros-apt-deploy), so it can
  # only publish a release, never open a shell or run anything else.
  publish-apt:
    runs-on: ubuntu-24.04
    needs: [build, smoke-test]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Publish to apt.muros.org
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.APT_DEPLOY_KEY }}" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          printf '%s\n' "${{ secrets.APT_DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          # The tag (GITHUB_REF_NAME, e.g. v0.9.0-rc4) is passed as the SSH
          # command; the server-side forced command validates it and runs
          # muros-apt-publish with it.
          ssh -i ~/.ssh/deploy -o IdentitiesOnly=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "root@${{ secrets.APT_DEPLOY_HOST }}" "${GITHUB_REF_NAME}"

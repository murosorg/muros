name: ci

on:
  pull_request:
  push:
    branches:
      - main

# Read-only: CI never publishes anything. Releases are done by build-deb.yml.
permissions:
  contents: read

# Cancel older runs on the same branch when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (pytest)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff lint
        working-directory: backend
        # Static guardrail: catches unused imports/variables, ambiguous
        # names, stray semicolons, undefined names, etc. before they ship.
        run: ruff check app
      - name: Run pytest
        working-directory: backend
        run: pytest -q

  frontend:
    name: frontend (tsc + vite)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Type check and build
        working-directory: frontend
        # The build script already runs `tsc -b && vite build`.
        run: npm run build

  shell:
    name: shell (shellcheck)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck
      - name: Lint shell scripts
        # Top-level install/uninstall scripts plus anything shipped under
        # packaging/. Only errors fail the run; style warnings are tolerated.
        run: |
          shellcheck -S error -e SC1091 \
            install.sh uninstall.sh \
            $(find packaging -name '*.sh' -type f)

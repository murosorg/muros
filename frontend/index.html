<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- MurOS is a desktop-first admin console. On phones we render
         the full desktop layout at 1280px and let the user pinch-zoom
         and pan, instead of forcing a divergent mobile shell with a
         hamburger and a top header. -->
    <meta name="viewport" content="width=1280" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- No web fonts on purpose: a firewall appliance is frequently offline,
         so we render with the native system UI / monospace stack instead of
         depending on (and leaking to) an external font CDN. -->
    <title>MurOS</title>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

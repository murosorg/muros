[stop]
command:/usr/local/opnsense/scripts/kea/kea_service.sh stop
parameters:
type:script
message:stop kea daemon

[start]
command:/usr/local/opnsense/scripts/kea/kea_service.sh start
parameters:
type:script
message:start kea daemon

[restart]
command:/usr/local/opnsense/scripts/kea/kea_service.sh restart
parameters:
type:script
message:restart kea daemon
description:Restart kea daemon

[status]
command:/usr/local/opnsense/scripts/kea/kea_service.sh status
parameters:
type:script_output
message:get kea daemon status

[list.dhcp_options]
command:/usr/local/opnsense/scripts/kea/kea_dhcp_options.py dhcp
type:script_output
message:request dhcp options
cache_ttl:86400

[list.dhcp_options6]
command:/usr/local/opnsense/scripts/kea/kea_dhcp_options.py dhcp6
type:script_output
message:request dhcp6 options
cache_ttl:86400

[list.leases4]
command:/usr/local/opnsense/scripts/kea/get_kea_leases.py
parameters:--proto inet
type:script_output
message:list kea inet dhcp leases

[list.leases6]
command:/usr/local/opnsense/scripts/kea/get_kea_leases.py
parameters:--proto inet6
type:script_output
message:list kea inet dhcp leases

[delete.lease]
command:/usr/local/opnsense/scripts/kea/del_kea_leases.py
parameters:%s
type:script_output
message:delete kea dhcp lease

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- 3 descending amber bars -->
  <rect x="10" y="15" width="44" height="12" rx="2" fill="#F5C518"/>
  <rect x="10" y="33" width="34" height="12" rx="2" fill="#F5C518"/>
  <rect x="10" y="51" width="24" height="12" rx="2" fill="#F5C518"/>

  <!-- MurOS wordmark in white for dark backgrounds; OS in amber, bold -->
  <text
    x="70"
    y="57"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="52"
    letter-spacing="-2"
    fill="#ffffff"
  ><tspan>Mur</tspan><tspan fill="#F5C518">OS</tspan></text>
</svg>

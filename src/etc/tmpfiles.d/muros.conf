# MurOS runtime directories (Debian)
# Created at boot by systemd-tmpfiles. On FreeBSD these directories were
# provided by the mtree /var specification applied from the rc boot scripts;
# on Debian that step does not run, so we declare the runtime tree here.

# Staging area for generated service configuration: legacy config snapshots,
# dnsmasq hosts/leases, openvpn client-specific config, etc. Helpers such as
# file_safe() rename() temporary files into this directory, which therefore
# has to exist before any service is configured.
d /var/etc 0755 root root -

# Volt compiled-template cache and PHP temp/session directories must exist and
# be writable by the web user, otherwise template rendering and login fail.
d /var/lib/php/cache 0775 www-data www-data -
d /var/lib/php/tmp 0700 www-data www-data -
d /var/lib/php/sessions 0700 www-data www-data -

# Persistent on-disk OPcache used by the CLI SAPI (configd action layer). Owned
# by root with group write for www-data so both the root configd actions and
# any www-data CLI helper can populate it. Without this the backend recompiles
# the whole PHP codebase on every action.
d /var/lib/php/opcache 0775 root www-data -
